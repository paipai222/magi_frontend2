<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project: Magi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;500;600&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  /* ── LIGHT MODE (default) ── */
  :root {
    --black: #0a0a0a;
    --white: #ffffff;
    --gray-100: #f5f5f5;
    --gray-200: #e8e8e8;
    --gray-300: #d0d0d0;
    --gray-400: #a0a0a0;
    --gray-500: #6b6b6b;
    --gray-600: #4a4a4a;
    --border: #e0e0e0;
    --bg: #ffffff;
    --surface: #f5f5f5;
    --font-mono: 'Source Code Pro', monospace;
    --font-sans: 'Source Sans 3', sans-serif;
  }

  /* ── DARK MODE ── */
  body.dark {
    --black: #f0f0f0;
    --white: #111111;
    --gray-100: #1e1e1e;
    --gray-200: #2a2a2a;
    --gray-300: #3a3a3a;
    --gray-400: #666666;
    --gray-500: #888888;
    --gray-600: #aaaaaa;
    --border: #2e2e2e;
    --bg: #111111;
    --surface: #1e1e1e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    background: var(--white);
    color: var(--black);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.2s, color 0.2s;
  }

  /* ── TOP NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    transition: background 0.2s, border-color 0.2s;
  }
  .nav-logo {
    font-family: var(--font-mono);
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--black);
  }
  .nav-logo span { color: var(--gray-400); }
  .nav-right { display: flex; align-items: center; gap: 20px; }
  .nav-tag {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.12em;
    color: var(--gray-500); text-transform: uppercase;
  }
  .round-badge {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gray-500); padding: 3px 7px;
    border: 1px solid var(--border);
    display: none;
  }
  .round-badge.show { display: inline-block; }

  /* ── DARK MODE TOGGLE (nav) ── */
  .dark-toggle {
    display: flex; align-items: center; gap: 7px; cursor: pointer;
  }
  .dark-toggle-label {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--gray-500); user-select: none;
  }
  .dark-toggle-track {
    position: relative; width: 36px; height: 20px;
    background: var(--gray-200); border: 1px solid var(--border);
    cursor: pointer; transition: background 0.2s;
    flex-shrink: 0;
  }
  body.dark .dark-toggle-track { background: var(--gray-400); border-color: var(--gray-400); }
  .dark-toggle-thumb {
    position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; background: var(--white);
    transition: transform 0.2s cubic-bezier(.4,0,.2,1);
  }
  body.dark .dark-toggle-thumb { transform: translateX(16px); }

  /* ── MAIN LAYOUT ── */
  main {
    margin-top: 52px;
    height: calc(100vh - 52px);
    display: flex; flex-direction: column;
  }

  /* ── CONTROL BAR ── */
  .control-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--white);
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s;
  }
  .mode-info { display: flex; align-items: center; gap: 12px; }
  .mode-label {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--gray-500);
  }
  .mode-value {
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--black);
  }

  /* Mode Toggle */
  .toggle-wrap { display: flex; align-items: center; gap: 12px; }
  .toggle-label {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--gray-500);
    transition: color 0.2s;
  }
  .toggle-label.active { color: var(--black); font-weight: 600; }
  .toggle {
    position: relative; width: 48px; height: 24px;
    background: var(--gray-200); border: 1px solid var(--border);
    cursor: pointer; transition: background 0.2s; flex-shrink: 0;
  }
  .toggle.on { background: var(--black); border-color: var(--black); }
  .toggle-thumb {
    position: absolute; top: 3px; left: 3px;
    width: 16px; height: 16px; background: var(--white);
    transition: transform 0.2s cubic-bezier(.4,0,.2,1);
  }
  .toggle.on .toggle-thumb { transform: translateX(24px); }

  .auto-rounds { display: none; align-items: center; gap: 8px; }
  .auto-rounds.show { display: flex; }
  .auto-rounds label {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--gray-500);
  }
  .auto-rounds input[type=range] { width: 80px; accent-color: var(--black); }
  .auto-rounds .round-val {
    font-family: var(--font-mono); font-size: 11px; font-weight: 600;
    color: var(--black); min-width: 14px;
  }

  /* ── BOT PANELS ── */
  .panels-area { flex: 1; display: flex; overflow: hidden; }
  .bot-panel {
    flex: 1; display: flex; flex-direction: column;
    border-right: 1px solid var(--border); overflow: hidden;
  }
  .bot-panel:last-child { border-right: none; }

  .panel-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; background: var(--white);
    transition: background 0.2s, border-color 0.2s;
  }
  .panel-header-left { display: flex; align-items: center; gap: 10px; }
  .bot-index {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.15em; color: var(--gray-400); text-transform: uppercase;
  }
  .bot-name {
    font-family: var(--font-mono); font-size: 12px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--black);
  }
  .bot-role {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.08em; color: var(--gray-400); text-transform: uppercase;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gray-300); flex-shrink: 0; transition: background 0.3s;
  }
  .status-dot.thinking { background: #f59e0b; animation: pulse-dot 1s infinite; }
  .status-dot.ready { background: #22c55e; }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Messages */
  .messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
    scroll-behavior: smooth;
    background: var(--white);
    transition: background 0.2s;
  }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--gray-300); }

  .msg { display: flex; flex-direction: column; gap: 4px; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg-role {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--gray-400);
  }
  .msg-body {
    font-size: 13px; line-height: 1.65;
    color: var(--black); font-family: var(--font-sans); font-weight: 300;
  }
  .msg.user .msg-role { color: var(--gray-600); }
  .msg.user .msg-body {
    background: var(--gray-100); padding: 10px 14px;
    border-left: 2px solid var(--black); font-weight: 400;
  }
  .msg.assistant .msg-body { padding: 10px 14px; border-left: 2px solid var(--border); }
  .msg.system .msg-body {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.08em; color: var(--gray-500);
    padding: 6px 0; border: none; background: none;
  }

  .thinking-msg .msg-body {
    display: flex; align-items: center; gap: 6px;
    color: var(--gray-400); font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.08em;
    padding: 10px 14px; border-left: 2px solid var(--gray-300);
  }
  .dots { display: flex; gap: 3px; }
  .dots span {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--gray-400); animation: blink 1.2s infinite;
  }
  .dots span:nth-child(2){animation-delay:0.2s}
  .dots span:nth-child(3){animation-delay:0.4s}
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  .msg.error .msg-body {
    color: #dc2626; padding: 10px 14px;
    border-left: 2px solid #fca5a5;
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.06em; background: #fff5f5;
  }
  body.dark .msg.error .msg-body { background: #2a1010; }

  /* ── USER INPUT BAR ── */
  .global-input-bar {
    padding: 16px 32px; border-top: 1px solid var(--border);
    background: var(--white); display: flex; gap: 12px; align-items: flex-end;
    flex-shrink: 0; transition: background 0.2s, border-color 0.2s;
  }
  .global-input-bar.hidden { display: none; }
  .global-textarea {
    flex: 1; min-height: 44px; max-height: 140px; padding: 11px 14px;
    font-family: var(--font-sans); font-size: 13px; font-weight: 300;
    border: 1px solid var(--border); resize: none; outline: none;
    transition: border-color 0.15s, background 0.2s; line-height: 1.5;
    background: var(--gray-100); color: var(--black);
  }
  .global-textarea:focus { border-color: var(--black); background: var(--white); }
  .send-btn {
    height: 44px; padding: 0 20px;
    background: var(--black); color: var(--white);
    border: none; cursor: pointer;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase;
    flex-shrink: 0; transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.75; }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── AUTO MODE BAR ── */
  .auto-control-bar {
    padding: 16px 32px; border-top: 1px solid var(--border);
    background: var(--white); display: flex; align-items: center;
    justify-content: space-between; flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s;
  }
  .auto-control-bar.hidden { display: none; }
  .seed-input-wrap { display: flex; align-items: center; gap: 10px; }
  .seed-input-wrap label {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--gray-500);
  }
  .seed-textarea {
    width: 300px; min-height: 36px; max-height: 80px; padding: 8px 10px;
    font-family: var(--font-sans); font-size: 12px;
    border: 1px solid var(--border); resize: none; outline: none;
    background: var(--gray-100); color: var(--black);
    transition: border-color 0.15s, background 0.2s;
  }
  .seed-textarea:focus { border-color: var(--black); background: var(--white); }
  .auto-btns { display: flex; gap: 10px; }
  .auto-start-btn {
    padding: 10px 24px; background: var(--black); color: var(--white);
    border: none; cursor: pointer; font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    transition: opacity 0.15s;
  }
  .auto-start-btn:hover { opacity: 0.75; }
  .auto-start-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .auto-stop-btn {
    padding: 10px 24px; background: var(--white); color: var(--black);
    border: 1px solid var(--black); cursor: pointer;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.15em; text-transform: uppercase;
    display: none; transition: background 0.15s;
  }
  .auto-stop-btn:hover { background: var(--gray-100); }
  .auto-stop-btn.show { display: block; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">Project<span>: Magi</span></div>
  <div class="nav-right">
    <span class="nav-tag" id="modeTag">USER ↔ AI</span>
    <span class="round-badge" id="roundBadge">ROUND 0</span>
    <!-- 다크모드 토글 -->
    <div class="dark-toggle" onclick="toggleDark()" title="Dark Mode">
      <span class="dark-toggle-label" id="darkLabel">Dark</span>
      <div class="dark-toggle-track">
        <div class="dark-toggle-thumb"></div>
      </div>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main>
  <!-- CONTROL BAR -->
  <div class="control-bar">
    <div class="mode-info">
      <span class="mode-label">Mode</span>
      <span class="mode-value" id="modeValueLabel">User Chat</span>
    </div>
    <div class="toggle-wrap">
      <span class="toggle-label active" id="label-user">USER → AI</span>
      <div class="toggle" id="modeToggle" onclick="toggleMode()">
        <div class="toggle-thumb"></div>
      </div>
      <span class="toggle-label" id="label-auto">AI ↔ AI</span>
      <div class="auto-rounds" id="autoRoundsCtrl">
        <label>Rounds</label>
        <input type="range" id="roundsSlider" min="1" max="10" value="3" oninput="updateRoundDisplay()">
        <span class="round-val" id="roundDisplay">3</span>
      </div>
    </div>
  </div>

  <!-- BOT PANELS -->
  <div class="panels-area">
    <div class="bot-panel">
      <div class="panel-header">
        <div class="panel-header-left">
          <span class="bot-index">01</span>
          <div>
            <div class="bot-name">Melchior</div>

          </div>
        </div>
        <div class="status-dot" id="dot-0"></div>
      </div>
      <div class="messages" id="msgs-0"></div>
    </div>
    <div class="bot-panel">
      <div class="panel-header">
        <div class="panel-header-left">
          <span class="bot-index">02</span>
          <div>
            <div class="bot-name">Balthasar</div>

          </div>
        </div>
        <div class="status-dot" id="dot-1"></div>
      </div>
      <div class="messages" id="msgs-1"></div>
    </div>
    <div class="bot-panel">
      <div class="panel-header">
        <div class="panel-header-left">
          <span class="bot-index">03</span>
          <div>
            <div class="bot-name">Casper</div>

          </div>
        </div>
        <div class="status-dot" id="dot-2"></div>
      </div>
      <div class="messages" id="msgs-2"></div>
    </div>
  </div>

  <!-- USER MODE INPUT -->
  <div class="global-input-bar" id="userInputBar">
    <textarea class="global-textarea" id="userInput"
      placeholder="메시지 입력 — Melchior · Balthasar · Casper 3개 AI에 동시 전송됩니다..."
      rows="1" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendUserMessage()">Send →</button>
  </div>

  <!-- AUTO MODE CONTROLS -->
  <div class="auto-control-bar hidden" id="autoControlBar">
    <div class="seed-input-wrap">
      <label>Seed Topic</label>
      <textarea class="seed-textarea" id="seedInput"
        placeholder="AI들이 토론할 주제를 입력하세요..." rows="1"></textarea>
    </div>
    <div class="auto-btns">
      <button class="auto-stop-btn" id="autoStopBtn" onclick="stopAutoChat()">■ Stop</button>
      <button class="auto-start-btn" id="autoStartBtn" onclick="startAutoChat()">▶ Start Auto</button>
    </div>
  </div>
</main>

<script>
const BOT_NAMES = ['Melchior', 'Balthasar', 'Casper'];
let conversations   = [[], [], []];
let isAutoMode      = false;
let autoStopped     = false;
let totalAutoRounds = 3;
let currentRound    = 0;

// ── DARK MODE ────────────────────────────────────
function toggleDark() {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  document.getElementById('darkLabel').textContent = isDark ? 'Light' : 'Dark';
  localStorage.setItem('magi-dark', isDark ? '1' : '0');
}
// 페이지 로드 시 저장된 다크모드 복원
(function() {
  if (localStorage.getItem('magi-dark') === '1') {
    document.body.classList.add('dark');
    document.getElementById('darkLabel').textContent = 'Light';
  }
})();

// ── PROXY API CALL ──────────────────────────────
const MAX_HISTORY_TURNS = 2;

function trimHistory(history) {
  const maxMessages = MAX_HISTORY_TURNS * 2;
  if (history.length <= maxMessages) return history;
  return history.slice(-maxMessages);
}

async function callBot(panelIdx, history) {
  setDot(panelIdx, 'thinking');
  const thinking = addThinking(panelIdx);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        botIndex: panelIdx,
        messages: trimHistory(history).map(m => ({ role: m.role, content: m.content })),
      }),
    });

    thinking.remove();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      addErrorMsg(panelIdx, `Error ${res.status}: ${err.error || res.statusText}`);
      setDot(panelIdx, '');
      return null;
    }

    const data = await res.json();
    const reply = data.reply || '';

    conversations[panelIdx].push({ role: 'assistant', content: reply });
    addMsg(panelIdx, 'assistant', reply);
    setDot(panelIdx, 'ready');
    return reply;

  } catch (e) {
    thinking.remove();
    addErrorMsg(panelIdx, `Network error: ${e.message}`);
    setDot(panelIdx, '');
    return null;
  }
}

// ── MODE TOGGLE ─────────────────────────────────
function toggleMode() {
  isAutoMode = !isAutoMode;
  document.getElementById('modeToggle').classList.toggle('on', isAutoMode);
  document.getElementById('label-user').classList.toggle('active', !isAutoMode);
  document.getElementById('label-auto').classList.toggle('active', isAutoMode);
  document.getElementById('modeValueLabel').textContent = isAutoMode ? 'AI Auto Chat' : 'User Chat';
  document.getElementById('modeTag').textContent        = isAutoMode ? 'AI ↔ AI' : 'USER ↔ AI';
  document.getElementById('userInputBar').classList.toggle('hidden', isAutoMode);
  document.getElementById('autoControlBar').classList.toggle('hidden', !isAutoMode);
  document.getElementById('autoRoundsCtrl').classList.toggle('show', isAutoMode);
}

function updateRoundDisplay() {
  const v = document.getElementById('roundsSlider').value;
  document.getElementById('roundDisplay').textContent = v;
  totalAutoRounds = parseInt(v);
}

// ── USER CHAT MODE ───────────────────────────────
async function sendUserMessage() {
  const input = document.getElementById('userInput');
  const text  = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = '';
  document.getElementById('sendBtn').disabled = true;

  for (let i = 0; i < 3; i++) {
    conversations[i].push({ role: 'user', content: text });
    addMsg(i, 'user', text);
  }
  await Promise.all([0, 1, 2].map(i => callBot(i, conversations[i])));
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendUserMessage(); }
}

// ── AUTO CHAT MODE ───────────────────────────────
async function startAutoChat() {
  const seed = document.getElementById('seedInput').value.trim();
  if (!seed) { document.getElementById('seedInput').focus(); return; }

  totalAutoRounds = parseInt(document.getElementById('roundsSlider').value);
  autoStopped = false; currentRound = 0;

  document.getElementById('autoStartBtn').disabled = true;
  document.getElementById('autoStopBtn').classList.add('show');
  document.getElementById('roundBadge').classList.add('show');

  conversations = [[], [], []];
  [0,1,2].forEach(i => { document.getElementById(`msgs-${i}`).innerHTML = ''; });
  [0,1,2].forEach(i => addSystemMsg(i, `// Auto Chat 시작 — ${totalAutoRounds} rounds`));

  for (let i = 0; i < 3; i++) {
    conversations[i].push({ role: 'user', content: seed });
    addMsg(i, 'user', seed);
  }
  await Promise.all([0,1,2].map(i => callBot(i, conversations[i])));
  if (autoStopped) { endAutoChat(); return; }

  for (let round = 0; round < totalAutoRounds; round++) {
    if (autoStopped) break;
    currentRound = round + 1;
    document.getElementById('roundBadge').textContent = `ROUND ${currentRound}/${totalAutoRounds}`;
    [0,1,2].forEach(i => addSystemMsg(i, `// Round ${currentRound}`));

    const latest = [0,1,2].map(i => conversations[i].at(-1)?.content || '');

    const prompts = [
      `${latest[1]}\n\n${latest[2]}`,
      `${latest[0]}\n\n${latest[2]}`,
      `${latest[0]}\n\n${latest[1]}`,
    ];

    for (let i = 0; i < 3; i++) {
      conversations[i].push({ role: 'user', content: prompts[i] });
      addMsg(i, 'user', prompts[i]);
    }
    await Promise.all([0,1,2].map(i => callBot(i, conversations[i])));
    if (!autoStopped) await sleep(300);
  }
  endAutoChat();
}

function stopAutoChat() { autoStopped = true; }
function endAutoChat() {
  document.getElementById('autoStartBtn').disabled = false;
  document.getElementById('autoStopBtn').classList.remove('show');
  [0,1,2].forEach(i => addSystemMsg(i, '// Session 종료'));
}

// ── UI HELPERS ───────────────────────────────────
function addMsg(idx, role, text) {
  const c = document.getElementById(`msgs-${idx}`);
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `<div class="msg-role">${role === 'user' ? 'You' : BOT_NAMES[idx]}</div>
    <div class="msg-body">${esc(text)}</div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}
function addSystemMsg(idx, text) {
  const c = document.getElementById(`msgs-${idx}`);
  const d = document.createElement('div');
  d.className = 'msg system';
  d.innerHTML = `<div class="msg-body">${esc(text)}</div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}
function addErrorMsg(idx, text) {
  const c = document.getElementById(`msgs-${idx}`);
  const d = document.createElement('div');
  d.className = 'msg error';
  d.innerHTML = `<div class="msg-role">Error</div><div class="msg-body">${esc(text)}</div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}
function addThinking(idx) {
  const c = document.getElementById(`msgs-${idx}`);
  const d = document.createElement('div');
  d.className = 'msg assistant thinking-msg';
  d.innerHTML = `<div class="msg-body"><span class="dots"><span></span><span></span><span></span></span></div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
  return d;
}
function setDot(idx, state) {
  document.getElementById(`dot-${idx}`).className = `status-dot ${state}`;
}
function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── TEXTAREA AUTO-RESIZE ─────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  [document.getElementById('userInput'), document.getElementById('seedInput')].forEach(el => {
    el.addEventListener('input', () => {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 140) + 'px';
    });
  });
});
</script>
